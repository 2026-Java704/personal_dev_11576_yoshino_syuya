<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>カテゴリ追加</title>
	<link rel="stylesheet" href="/css/home2.css">
</head>

<body>
	<main>
		<h1 class="title header sync-rate">EXTLA CATEGORY</h1>
	</main>
	<table class="sidebar">
		<tr>
			<td>
				<img src="/img/rogo.jpg" width="150px" height="150px">
			</td>
		</tr>
		<tr>
			<td class="">NAME：[[${@account.name}]]</td>
		</tr>
		<tr>
			<td class="">INCOME：&yen;[[${@account.income}]]</td>
		</tr>
		<tr>
			<td>
				<form action="/home" method="get">
					<button style="width: 100%; height: 100%;" class="button button:hover">HOME</button>
				</form>
			</td>
		</tr>
		<tr>
			<td>
				<form action="/user">
					<button style="width: 100%; height: 100%;" class="button button:hover">Edit Income</button>
				</form>
			</td>
		</tr>
		<tr>
			<td>
				<form action="/expens/add">
					<button style="width: 100%; height: 100%;" class="button button:hover">Expenditure</button>
				</form>
			</td>
		</tr>
		<tr>
			<td>
				<form action="/category/add">
					<button style="width: 100%; height: 100%;" class="button button:hover">Category</button>
				</form>
			</td>
		</tr>
		<tr>
			<td>
				<form action="/logout">
					<button style="width: 100%; height: 100%;" class="button button:hover">Logout</button>
				</form>
			</td>
		</tr>
	</table>

	<div>
		<table border="1" class="log category">
			<tr>
				<th>カテゴリー</th>
				<th>削除</th>
			</tr>
			<tr th:each="category:${categories}">
				<td th:text="${category.name}"></td>
				<td>
					<form th:action="@{/category/{categoryId}/delete(categoryId=${category.id})}" method="post">
						<button class="button button:hover">DELETE</button>
					</form>
				</td>
			</tr>
		</table>

		<form action="/category/add" method="post">
			<span th:text="${message}" style="color: red"></span> <br>
			<table border="1" class="nyuuryoku exe">
				<tr>
					<td>
						<input class="textbox" type="text" name="name">
					</td>
					<td>
						<button class="button button:hover">extla</button>
					</td>
				</tr>
			</table>
		</form>
	</div>
</body>

</html>
